name: CI

on:
  push:
    branches: [main]
    paths:
      - "src-tauri/**"
      - "src/**"
      - ".github/workflows/ci.yml"
  pull_request:
  workflow_dispatch:

# Prove the core builds and its git2 backend passes on all three desktop OSes.
jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      # Tauri/wry system libraries (Linux only).
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # The git backend tests shell out to `git` to build fixtures; it's present
      # on all GitHub runners.
      - name: Test
        run: cargo test

      - name: Build
        run: cargo build
