name: Release (Ko-fi / direct)

# Push a version tag (e.g. v0.1.0) to build signed installers for macOS,
# Windows, and Linux, plus the auto-update manifest (latest.json), and attach
# them to a draft GitHub Release. This is the DIRECT build: 7-day trial +
# license gate + self-updater. The App Store build is separate (see RELEASE.md).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - os: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - os: ubuntu-latest
            args: ""
          - os: windows-latest
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Update signing (from `.secrets/glint-updater.key`).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Public key for verifying license keys, embedded at build time.
          GLINT_LICENSE_PUBKEY: ${{ secrets.GLINT_LICENSE_PUBKEY }}
          # macOS Developer ID signing + notarization so the Ko-fi / GitHub
          # build opens without a Gatekeeper warning. Ignored on Windows/Linux
          # runners. tauri-action imports the cert into a temp keychain, signs
          # the .app/.dmg, then notarizes and staples.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Glint ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform. Existing installs update themselves."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ───────────────────────── Mac App Store ──────────────────────────────
  # Build the sandboxed, universal App Store .pkg and upload it to App Store
  # Connect. Separate from the direct-download build and NOT part of the public
  # GitHub Release (App Store pkgs only work through the store). Runs only when
  # the MAS + App Store Connect API secrets are present; otherwise it is skipped
  # so the rest of the release is unaffected. The app record must already exist
  # in App Store Connect (bundle id dev.peterdsp.glint, app id 6790709729).
  mas:
    runs-on: macos-14
    env:
      # One .p12 exported from the login keychain (holds the "Apple
      # Distribution" + "3rd Party Mac Developer Installer" identities among
      # others; the job selects them by name).
      MAS_CERTS_P12_BASE64: ${{ secrets.MAS_CERTS_P12_BASE64 }}
      MAS_CERTS_P12_PASSWORD: ${{ secrets.MAS_CERTS_P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.CI_KEYCHAIN_PASSWORD }}
      # base64 of the Mac App Store provisioning profile (.provisionprofile).
      MAS_PROVISION_PROFILE_BASE64: ${{ secrets.MAS_PROVISION_PROFILE_BASE64 }}
      TEAMID: ${{ secrets.TEAMID }}
      # App Store Connect API key (ASC -> Users and Access -> Integrations).
      # ASC_API_KEY_P8_BASE64 is the base64 of the AuthKey_<KEY_ID>.p8.
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install tauri-cli
        if: ${{ env.MAS_CERTS_P12_BASE64 != '' && env.ASC_API_KEY_P8_BASE64 != '' }}
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build + upload to App Store Connect
        if: ${{ env.MAS_CERTS_P12_BASE64 != '' && env.ASC_API_KEY_P8_BASE64 != '' }}
        run: |
          set -euo pipefail

          # 1. Import the App Store signing certs into a temporary keychain.
          KEYCHAIN_PATH="$RUNNER_TEMP/mas.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$MAS_CERTS_P12_BASE64" | base64 -d > "$RUNNER_TEMP/mas-certs.p12"
          security import "$RUNNER_TEMP/mas-certs.p12" -k "$KEYCHAIN_PATH" -P "$MAS_CERTS_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/mas-certs.p12"

          # 2. Resolve the signing identity names from the keychain.
          export MAS_APP=$(security find-identity -v "$KEYCHAIN_PATH" | grep "Apple Distribution" | head -1 | sed -E 's/^[^"]*"([^"]+)".*/\1/')
          export MAS_INST=$(security find-identity -v "$KEYCHAIN_PATH" | grep "3rd Party Mac Developer Installer" | head -1 | sed -E 's/^[^"]*"([^"]+)".*/\1/')
          echo "Signing as: $MAS_APP | $MAS_INST"

          # 3. Decode the provisioning profile for mas-package.sh to embed.
          echo "$MAS_PROVISION_PROFILE_BASE64" | base64 -d > "$RUNNER_TEMP/glint.provisionprofile"
          export PROFILE="$RUNNER_TEMP/glint.provisionprofile"

          # 4. Build + sign + package (sandboxed, license feature off, universal).
          ./scripts/mas-package.sh

          # 5. Write the App Store Connect API key for the upload.
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_API_KEY_P8_BASE64" | base64 -d > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

          # 6. Validate, then upload to App Store Connect.
          PKG="src-tauri/target/release/bundle/Glint.pkg"
          xcrun altool --validate-app -f "$PKG" -t macos \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
          xcrun altool --upload-app -f "$PKG" -t macos \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
          echo "Uploaded $PKG to App Store Connect."

      - name: Notice (App Store secrets not set)
        if: ${{ env.MAS_CERTS_P12_BASE64 == '' || env.ASC_API_KEY_P8_BASE64 == '' }}
        run: echo "MAS / App Store Connect API secrets not set - skipping App Store build + upload."
