name: Release (Ko-fi / direct)

# Push a version tag (e.g. v0.1.0) to build signed installers for macOS,
# Windows, and Linux, plus the auto-update manifest (latest.json), and attach
# them to a draft GitHub Release. This is the DIRECT build: 7-day trial +
# license gate + self-updater. The App Store build is separate (see RELEASE.md).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - os: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - os: ubuntu-latest
            args: ""
          - os: windows-latest
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Update signing (from `.secrets/glint-updater.key`).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Public key for verifying license keys, embedded at build time.
          GLINT_LICENSE_PUBKEY: ${{ secrets.GLINT_LICENSE_PUBKEY }}
          # macOS Developer ID signing + notarization so the Ko-fi / GitHub
          # build opens without a Gatekeeper warning. Ignored on Windows/Linux
          # runners. tauri-action imports the cert into a temp keychain, signs
          # the .app/.dmg, then notarizes and staples.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Glint ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform. Existing installs update themselves."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
